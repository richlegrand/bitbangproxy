name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: mac-amd64
          - goos: darwin
            goarch: arm64
            suffix: mac-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o bitbangproxy-${{ matrix.suffix }} ./cmd/bitbangproxy/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: bitbangproxy-${{ matrix.suffix }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: bitbangproxy-${{ matrix.suffix }}
