name: Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run unit tests
        run: go test ./internal/... -v

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build proxy
        run: go build ./cmd/bitbangproxy/

      - name: Install Python dependencies
        run: |
          pip install flask flask-sock pytest pytest-playwright playwright
          playwright install --with-deps chromium

      - name: Run E2E tests
        run: python -m pytest tests/e2e/ -v --screenshot=only-on-failure --output=tests/e2e/screenshots

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: tests/e2e/screenshots/
